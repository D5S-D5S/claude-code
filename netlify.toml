[build]
  base    = "solar_surge_ads/web"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* → /.netlify/functions/*
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[dev]
  port        = 8888
  targetPort  = 3000
  autoLaunch  = false
