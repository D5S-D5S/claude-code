# Solar Surge Ad Dashboard — separate Netlify site
# In Netlify site settings set Base directory: solar_surge_ads/web
[build]
  publish   = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
